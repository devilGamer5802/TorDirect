<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TorDirect - Torrent Streamer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>TorDirect <span class="subtitle">Torrent Streamer</span></h1>

    <div class="add-torrent">
        <h2>Add Torrent</h2>
        <form id="add-torrent-form">
            <input type="text" id="magnet-uri" placeholder="Paste Magnet URI" required>
            <button type="submit">Add Magnet</button>
        </form>
        <p class="status-message" id="add-status"></p>
    </div>

    <div class="torrent-list">
        <h2>Active Torrents</h2>
        <ul id="torrents">
            <!-- Torrent items will be added here by JavaScript -->
            <li class="loading-placeholder">Loading torrents...</li>
        </ul>
    </div>

    <!-- Streaming Player Modal -->
    <div id="player-modal" class="modal">
        <div class="modal-content">
            <span class="close-button" onclick="closePlayer()">×</span>
            <h3 id="player-title">Streaming File</h3>
            <div id="player-container">
                <!-- Video/Audio tag will be inserted here -->
            </div>
        </div>
    </div>


    <!-- Include Socket.IO client library -->
    <script src="/socket.io/socket.io.js"></script>
    <!-- Include Frontend Logic -->
    <script src="script.js"></script>
</body>
</html>
